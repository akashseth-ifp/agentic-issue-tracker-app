<div class="form-page">
  <h1 class="form-page__title">{{ isEditMode ? 'Edit Issue' : 'New Issue' }}</h1>

  @if (isFetching()) {
    <app-loading-spinner />
  }

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form__field">
      <label class="form__label" for="title">Title <span class="form__required">*</span></label>
      <input
        id="title"
        class="form__input"
        [class.form__input--error]="isTitleInvalid"
        formControlName="title"
        placeholder="Short summary of the issue"
      />
      @if (isTitleInvalid) {
        @if (titleErrors?.['required']) {
          <span class="form__error">Title is required</span>
        }
        @if (titleErrors?.['maxlength']) {
          <span class="form__error">Max 255 characters</span>
        }
      }
    </div>

    <div class="form__field">
      <label class="form__label" for="description">Description</label>
      <textarea
        id="description"
        class="form__textarea"
        formControlName="description"
        rows="4"
        placeholder="Optional details about the issue"
      ></textarea>
    </div>

    <div class="form__field">
      <label class="form__label" for="status">Status</label>
      <select id="status" class="form__select" formControlName="status">
        @for (s of statusOptions; track s) {
          <option [value]="s">{{ s }}</option>
        }
      </select>
    </div>

    <div class="form__actions">
      <button type="button" class="btn btn--secondary" routerLink="/issues">Cancel</button>
      <button type="submit" class="btn btn--primary" [disabled]="form.invalid || isSubmitting()">
        @if (isSubmitting()) { Saving... } @else { {{ isEditMode ? 'Update Issue' : 'Create Issue' }} }
      </button>
    </div>
  </form>
</div>
